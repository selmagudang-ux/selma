<!DOCTYPE html>
<html>

<head>

  <title>SELMA ACC BANDUNG</title>

  <link
    rel="stylesheet"
    href="style.css">

</head>

<body>
<div class="dashboard">

  <div class="card">
    <h2 id="total-sku">0</h2>
    <p>Total SKU</p>
  </div>

  <div class="card">
    <h2 id="with-image">0</h2>
    <p>Sudah Ada Foto</p>
  </div>

  <div class="card">
    <h2 id="without-image">0</h2>
    <p>Belum Ada Foto</p>
  </div>

</div>
<div class="box">

  <h1>Upload Foto Produk</h1>

<div class="search-box">

  <input
    type="text"
    id="sku"
    placeholder="Cari SKU">

  <div id="suggestions"></div>

</div>

  
<button
  type="button"
  onclick="addSKU()">

  Tambah SKU

</button>
  
<div id="sku-container"></div>

  
  <div
    class="drop-area"
    id="drop-area">

    <p>Drag & Drop Foto</p>

    <p class="small">
      atau klik untuk pilih file
    </p>

    <input
  type="file"
  id="image"
  multiple
  hidden>

  </div>



  <img
    id="preview"
    style="
      width:100%;
      margin-top:15px;
      border-radius:10px;
      display:none;
    ">
<div id="bulk-preview"></div>


  <h3>Foto Lama</h3>

  <img
    id="old-preview"
    onerror="this.style.display='none'"
    style="
      width:100%;
      border-radius:10px;
      display:none;
    ">



  <button onclick="uploadImage()">
    Upload
  </button>



  <button onclick="deleteImage()">
    Hapus Foto
  </button>



  <p id="status"></p>

</div>

<script src="script.js"></script>

</body>
</html>
