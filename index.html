<!DOCTYPE html>
<html>

<head>

  <title>Upload Foto SKU</title>

  <link
    rel="stylesheet"
    href="style.css">

</head>

<body>

<div class="box">

  <h1>Upload Foto Produk</h1>



  <input
  type="text"
  id="sku"
  list="sku-list"
  placeholder="Masukkan SKU">
<button
  type="button"
  onclick="addSKU()">

  Tambah SKU

</button>
  
<div id="sku-container"></div>

<datalist id="sku-list"></datalist>
  



  <div
    class="drop-area"
    id="drop-area">

    <p>Drag & Drop Foto</p>

    <p class="small">
      atau klik untuk pilih file
    </p>

    <input
      type="file"
      id="image"
      hidden>

  </div>



  <img
    id="preview"
    style="
      width:100%;
      margin-top:15px;
      border-radius:10px;
      display:none;
    ">



  <h3>Foto Lama</h3>

  <img
    id="old-preview"
    onerror="this.style.display='none'"
    style="
      width:100%;
      border-radius:10px;
      display:none;
    ">



  <button onclick="uploadImage()">
    Upload
  </button>



  <button onclick="deleteImage()">
    Hapus Foto
  </button>



  <p id="status"></p>

</div>

<script src="script.js"></script>

</body>
</html>
